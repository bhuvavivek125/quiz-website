<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="description" content="Check out the verified results of the IQ Quiz. Are you a genius or average? Play now to find out!">

    <!-- Bootstrap 5 CSS -->

    <style>
        :root {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --text-dark: #222222;
            --ad-bg: #f8f9fa;
            --ad-border: #ced4da;
        }

        body {
            background: url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=1920&q=80') center/cover fixed, #111;
            font-family: Arial, sans-serif;
            color: var(--text-dark);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        #app-wrapper {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 15px 15px 5px 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
            position: relative;
        }

        .result-card, .loading-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 35px 25px;
            max-width: 450px;
            width: 95%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            text-align: center;
        }

        /* Notice Badges */
        .badge-topic {
            background-color: #6fbaff;
            color: white;
            font-size: 0.9rem;
            padding: 6px 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: inline-block;
            font-weight: bold;
        }

        .loading-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 350px;
            transition: opacity 0.5s ease;
        }

        .spinner-wrapper { margin-bottom: 25px; }

        #loading-message {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--primary-color);
            transition: opacity 0.3s ease;
        }

        .result-card { display: none; }

        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .score-circle {
            width: 140px;
            height: 140px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 5px solid var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 242, 254, 0.2);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .score-circle h1 {
            color: var(--primary-color);
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
        }

        h2.result-title {
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        h3.result-verdict {
            font-weight: 800;
            font-size: 1.6rem;
            margin-bottom: 20px;
        }

        .top-banner-ad {
            width: 100%;
            background: rgba(255,255,255,0.15);
            border: 1px dashed rgba(255,255,255,0.6);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 15px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .bottom-info-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 12px 15px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
            color: #ffffff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            width: 100%;
        }

        .info-icon {
            font-size: 1.6rem;
            flex-shrink: 0;
            background: rgba(255,255,255,0.25);
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.2);
        }

        .info-text {
            font-size: 0.85rem;
            line-height: 1.35;
            opacity: 0.95;
            flex: 1;
        }

        .info-text strong {
            display: block;
            font-size: 0.95rem;
            margin-bottom: 4px;
            color: #ffffff;
            opacity: 1;
            letter-spacing: 0.5px;
        }

        .ad-container {
            width: 100%;
            min-height: 90px;
            background-color: var(--ad-bg);
            border: 2px dashed var(--ad-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #888888;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .btn-restart {
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            font-size: 1.15rem;
            font-weight: 700;
            padding: 14px;
            border-radius: 14px;
            width: 100%;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-restart:hover {
            background: var(--primary-color);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(79, 172, 254, 0.3);
        }

        .btn-share {
            background: #25D366;
            color: #ffffff;
            font-size: 1.15rem;
            font-weight: 700;
            padding: 14px;
            border-radius: 14px;
            border: none;
            width: 100%;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .btn-share:hover {
            background: #1ebe57;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
            color: white;
        }

        footer {
            margin-top: 30px;
            padding-bottom: 10px;
        }

        footer a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.95rem;
            margin: 0 12px;
            opacity: 0.85;
            transition: opacity 0.3s;
            font-weight: 500;
        }

        footer a:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="app-wrapper">

        <div class="w-100">
            <!-- Top External Banner Ad -->
            <div class="top-banner-ad" style="margin-bottom: 0; padding: 0; display: block; overflow: hidden;">
                <!-- 2️⃣ First Ad Unit -->
                <ins class="adsbygoogle"
                     style="display:block; min-height: 60px;"

                     data-ad-slot="YOUR_AD_SLOT_ID_1"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </div>

        <div class="loading-card" id="loading-card">
        <div class="spinner-wrapper">
            <div class="spinner-border" style="width: 4rem; height: 4rem; color: var(--primary-color);" role="status">

        <div id="loading-message">Analyzing your answers...</div>

    <div class="result-card fade-in" id="result-card">

            <!-- 3️⃣ Second Ad Unit -->
            <ins class="adsbygoogle"
                 style="display:block; min-height: 90px;"
                 data-ad-client="ca-pub-YOUR_CLIENT_ID"
                 data-ad-slot="YOUR_AD_SLOT_ID_2"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <div class="score-circle">
            <h1 id="score-display">0/0</h1>
        </div>

        <h3 id="result-verdict" class="result-verdict">...</h3>

        <div class="ad-container shadow-sm mt-3 mb-4" style="padding: 0; overflow: hidden; display: block;">
            <!-- 4️⃣ Third Ad Unit -->
            <ins class="adsbygoogle"
                 style="display:block; min-height: 90px;"
                 data-ad-client="ca-pub-YOUR_CLIENT_ID"
                 data-ad-slot="YOUR_AD_SLOT_ID_3"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <div class="action-buttons">
            <button id="share-btn" class="btn-share">
                <i class="bi bi-whatsapp me-2 fs-5"></i> Spread Challenge
            </button>
            <a href="index.html" class="btn-restart" id="restart-btn">Try Another Topic</a>
        </div>

    </div>

        <div class="w-100">
            <!-- Premium Glassmorphism Info Card -->
            <div class="bottom-info-card">
                <div class="info-icon">🏆</div>
                <div class="info-text">
                    <strong>Well Played!</strong>
                    Challenge your friends to beat your score! Explore our homepage for entirely new topics.
                </div>
            </div>

            <footer class="text-center">
                <a href="about.html">About</a> | 
                <a href="contact.html">Contact</a> | 
                <a href="privacy.html">Privacy</a>
            </footer>
        </div>

    </div> <!-- app wrapper ends -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadingCard = document.getElementById('loading-card');
            const resultCard = document.getElementById('result-card');
            const loadingMsg = document.getElementById('loading-message');
            
            const messages = ["Reading category database...", "Analyzing responses...", "Formatting scores..."];
            let msgIndex = 0;
            
            const msgInterval = setInterval(() => {
                msgIndex++;
                if(msgIndex < messages.length) {
                    loadingMsg.style.opacity = 0;
                    setTimeout(() => {
                        loadingMsg.innerText = messages[msgIndex];
                        loadingMsg.style.opacity = 1;
                    }, 200);
                }
            }, 900);

            setTimeout(() => {
                clearInterval(msgInterval);
                loadingCard.style.display = 'none';
                resultCard.style.display = 'block';

                // Data mapping dynamically generated
                const score = parseInt(localStorage.getItem('quizScore') || '0');
                const totalQ = parseInt(localStorage.getItem('totalQuestions') || '5');
                const topicContext = localStorage.getItem('quizTopic') || 'General IQ';
                
                const percentage = (totalQ === 0) ? 0 : (score / totalQ) * 100;

                const verdictElement = document.getElementById('result-verdict');
                let verdictStr = "";

                if (percentage >= 80) {
                    verdictStr = "You are Genius 😍";
                    verdictElement.style.color = "#28a745"; 
                } else if (percentage >= 40) {
                    verdictStr = "You are Average 🙂";
                    verdictElement.style.color = "#ff9800";
                } else {
                    verdictStr = "Try Again 😅";
                    verdictElement.style.color = "#dc3545"; 
                }

                // Render UI attributes seamlessly
                document.getElementById('topic-badge').innerText = topicContext;
                document.getElementById('score-display').innerText = `${score}/${totalQ}`;
                verdictElement.innerText = verdictStr;

                const shareBtn = document.getElementById('share-btn');
                shareBtn.addEventListener('click', () => {
                    let pageUrl = window.location.href.split('result.html')[0] || window.location.href; 
                    if (!pageUrl.endsWith('/')) {
                        pageUrl += '/';
                    }
                    const appUrl = pageUrl + 'index.html';
                    
                    const textContent = `I scored ${score}/${totalQ} inside the ${topicContext} Quiz!🏆 Result: ${verdictStr}. Try to beat my score here: ${appUrl}`;
                    const whatsappUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(textContent)}`;
                    window.open(whatsappUrl, '_blank');
                });

                // Clear tracked data securely post execution ensuring next category launches cleanly.
                localStorage.removeItem('quizScore');
                localStorage.removeItem('totalQuestions');
                localStorage.removeItem('quizTopic');
                
            }, 2800); 
        });
    </script>
</body>
</html>
