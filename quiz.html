            font-weight: bold;
            color: transparent;

        .tracker-dot.correct {
            background: #28a745;
            color: white;

        .tracker-dot.wrong {

        .tracker-dot.active {

            },

                data: [

                ]
            },
            bollywood: {
                title: "🎬 Bollywood",
                data: [

                    { question: "Which movie holds the record for highest grosser worldwide among older classics?", options: ["Sholay", "Mughal-E-Azam", "Dilwale Dulhania Le Jayenge", "Dangal"], answer: "Dangal" },
                    { question: "Who directed '3 Idiots'?", options: ["Karan Johar", "Rajkumar Hirani", "Sanjay Leela Bhansali", "Rohit Shetty"], answer: "Rajkumar Hirani" },
                    { question: "Which actress was known as the 'Hawa Hawai' girl?", options: ["Madhuri Dixit", "Sridevi", "Juhi Chawla", "Rekha"], answer: "Sridevi" },
                    { question: "In 'Sholay', what was the name of Basanti’s horse?", options: ["Chetak", "Dhanno", "Badal", "Shera"], answer: "Dhanno" },
                    { question: "Which actor played 'Munna Bhai'?", options: ["Arshad Warsi", "Sunny Deol", "Sanjay Dutt", "Govinda"], answer: "Sanjay Dutt" },
                    { question: "What is the name of the alien in the movie 'Koi... Mil Gaya'?", options: ["P.K.", "Jadoo", "Krish", "Milky"], answer: "Jadoo" },
                    { question: "Kitne aadmi the? is a famous line from which movie?", options: ["Deewaar", "Don", "Sholay", "Agneepath"], answer: "Sholay" },
                    { question: "Who composed the Oscar-winning song 'Jai Ho'?", options: ["Pritam", "Shankar-Ehsaan-Loy", "A. R. Rahman", "Vishal-Shekhar"], answer: "A. R. Rahman" },
                    { question: "In which movie does Kareena Kapoor play 'Geet'?", options: ["Kabhi Khushi Kabhie Gham", "Jab We Met", "Bodyguard", "3 Idiots"], answer: "Jab We Met" }
                ]
            },
            sports: {
                title: "🏏 Sports Quiz",
                data: [
                    { question: "Which country won the first ICC Cricket World Cup?", options: ["Australia", "India", "West Indies", "England"], answer: "West Indies" },
                    { question: "How many players are on a standard soccer team?", options: ["10", "11", "12", "9"], answer: "11" },
                    { question: "Who holds the record for the most Olympic gold medals?", options: ["Usain Bolt", "Michael Phelps", "Carl Lewis", "Mark Spitz"], answer: "Michael Phelps" },
                    { question: "In which sport would you perform a 'slam dunk'?", options: ["Tennis", "Basketball", "Volleyball", "Baseball"], answer: "Basketball" },
                    { question: "What is the national sport of Canada?", options: ["Ice Hockey", "Lacrosse", "Curling", "Both A and B"], answer: "Both A and B" },
                    { question: "How many grand slam tennis tournaments are there?", options: ["3", "4", "5", "6"], answer: "4" },
                    { question: "Which country is famous for the martial art 'Judo'?", options: ["China", "Korea", "Japan", "Thailand"], answer: "Japan" },
                    { question: "In cricket, how many runs are scored for hitting over the boundary without bouncing?", options: ["4", "5", "6", "8"], answer: "6" },
                    { question: "Who is known as the 'Lightning Bolt' in athletics?", options: ["Carl Lewis", "Tyson Gay", "Justin Gatlin", "Usain Bolt"], answer: "Usain Bolt" },
                    { question: "Which of these is an indoor game?", options: ["Table Tennis", "Golf", "Baseball", "Rugby"], answer: "Table Tennis" }
                ]
            }
        };

        // Determine specific loaded DB subset
        const categoryId = localStorage.getItem('selectedCategory') || 'gk'; // Default failsafe
        const activeCategory = quizDatabase[categoryId];

        // Advanced Fisher-Yates Shuffle Function for complete randomness
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Shuffle Questions uniquely per session
        const quizData = shuffleArray([...activeCategory.data]);

        // Apply UI header title logic
        document.getElementById('cat-title-display').innerText = activeCategory.title;

        // Base Iteration Setup
        let currentQuestionIndex = 0;
        let score = 0;
        let userAnswers = {};

        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const nextBtn = document.getElementById('next-btn');
        const progressCount = document.getElementById('question-count');
        const progressBar = document.getElementById('progress-bar');
        const adSlot = document.getElementById('ad-slot');
        const fadeContainer = document.getElementById('question-fade-container');

        // Functions
        function loadQuestion() {
            fadeContainer.classList.remove('fade-in');
            void fadeContainer.offsetWidth; 
            fadeContainer.classList.add('fade-in');

            const prevBtn = document.getElementById('prev-btn');
            if (currentQuestionIndex > 0) {
                prevBtn.style.display = 'block';
                nextBtn.classList.remove('w-100');
                nextBtn.classList.add('w-50');
            } else {
                prevBtn.style.display = 'none';
                nextBtn.classList.remove('w-50');
                nextBtn.classList.add('w-100');
            }

            // Update Trackers
            for (let i = 0; i < quizData.length; i++) {
                const dot = document.getElementById('dot-' + i);
                if (dot) {
                    dot.classList.remove('active');
                    if (i === currentQuestionIndex && !userAnswers[i]) {
                        dot.classList.add('active');
                        dot.innerText = i + 1;
                    } else if (!userAnswers[i]) {
                        dot.innerText = '';
                    }
                }
            }

            const currentQ = quizData[currentQuestionIndex];
            
            questionText.innerText = currentQ.question;
            progressCount.innerText = "Question " + (currentQuestionIndex + 1) + " of " + quizData.length;
            progressBar.style.width = (((currentQuestionIndex + 1) / quizData.length) * 100) + "%";

            optionsContainer.innerHTML = '';
            
            const randomizedOptions = shuffleArray([...currentQ.options]);
            
            randomizedOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectOption(btn, opt);
                optionsContainer.appendChild(btn);
            });

            nextBtn.disabled = true;
            nextBtn.innerText = currentQuestionIndex === quizData.length - 1 ? "Submit Quiz" : "Next";

            if (userAnswers[currentQuestionIndex]) {
                const ansData = userAnswers[currentQuestionIndex];
                Array.from(optionsContainer.children).forEach(btn => {
                    btn.style.pointerEvents = 'none';
                    if (btn.innerText === ansData.correctAns) {
                        btn.classList.add('correct');
                    } else if (btn.innerText === ansData.selected && !ansData.isCorrect) {
                        btn.classList.add('wrong');
                    }
                });
                nextBtn.disabled = false;
            }
        }

        function selectOption(selectedBtn, selectedValue) {
            const options = document.querySelectorAll('.option-btn');
            options.forEach(btn => btn.classList.remove('selected'));
            selectedBtn.classList.add('selected');
            selectedBtn.setAttribute('data-value', selectedValue);
            nextBtn.disabled = false;
        }

        nextBtn.addEventListener('click', () => {
            if (!userAnswers[currentQuestionIndex]) {
                const selectedBtn = document.querySelector('.option-btn.selected');
                if(!selectedBtn) return; 

                const selectedAnswer = selectedBtn.getAttribute('data-value');
                const isCorrect = (selectedAnswer === quizData[currentQuestionIndex].answer);
                
                if (isCorrect) score++;

                userAnswers[currentQuestionIndex] = {
                    selected: selectedAnswer,
                    correctAns: quizData[currentQuestionIndex].answer,
                    isCorrect: isCorrect
                };

                const dot = document.getElementById('dot-' + currentQuestionIndex);
                if (dot) {
                    dot.innerText = isCorrect ? '✔' : '✖';
                    dot.classList.remove('active');
                    if (isCorrect) dot.classList.add('correct');
                    else dot.classList.add('wrong');
                }
            }

            currentQuestionIndex++;

            if (currentQuestionIndex === 2 || currentQuestionIndex === 4) {
                adSlot.style.display = 'flex';
            } else {
                adSlot.style.display = 'none';
            }

            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                finishQuiz();
            }
        });

        function finishQuiz() {
            // Write specific variables including Title to localStorage
            localStorage.setItem('quizScore', score);
            localStorage.setItem('totalQuestions', quizData.length);
            localStorage.setItem('quizTopic', activeCategory.title);
            
            const wrapper = document.getElementById('main-card');
            wrapper.style.display = 'none'; 
            
            const loaderDiv = document.createElement('div');
            loaderDiv.className = 'loader-wrapper';
            loaderDiv.style.width = '100%';
            loaderDiv.style.flex = '1';
            loaderDiv.innerHTML = `
                <div class="spinner-border mb-3 mt-4 text-light" style="width: 4.5rem; height: 4.5rem;" role="status"></div>
                <h3 class="fw-bold mt-3 text-light">Evaluating Answers...</h3>
            `;
            // Critical fix: Append accurately to the inner app-wrapper mobile container layout
            document.getElementById('app-wrapper').appendChild(loaderDiv);

            setTimeout(() => {
                window.location.href = 'result.html';
            }, 1500);
        }

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const trackerContainer = document.getElementById('progress-tracker');
            for (let i = 0; i < quizData.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'tracker-dot';
                dot.id = 'dot-' + i;
                trackerContainer.appendChild(dot);
            }
            loadQuestion();
        });
    </script>
</body>
</html>
